font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
cursor_shape block
shell_integration no-cursor

enable_audio_bell no
enabled_layouts splits,stack,grid

map ctrl+shift+0 restore_font_size
map ctrl+c copy_or_interrupt

# Split shortcuts (Horizontal: Ctrl+Alt+- | Vertical: Ctrl+Alt+\)
map ctrl+alt+minus launch --location=hsplit
map ctrl+alt+backslash launch --location=vsplit

# Zoom in / Zoom out current pane (similar to tmux prefix+z)
map ctrl+shift+z toggle_layout stack
# Direct pane resize shortcuts (Horizontal: Ctrl+Alt+h/l | Vertical: Ctrl+Alt+j/k)
map ctrl+alt+h resize_window narrower 3
map ctrl+alt+l resize_window wider 3
map ctrl+alt+k resize_window taller 3
map ctrl+alt+j resize_window shorter 3

# Focus navigation shortcuts via Vim directions (Alt + h/j/k/l) - Commented to allow Alt+h/l in Neovim
# map alt+h neighboring_window left
# map alt+l neighboring_window right
# map alt+k neighboring_window up
# map alt+j neighboring_window down

window_padding_width 0 2
hide_window_decorations yes
confirm_os_window_close 0

allow_remote_control yes

listen_on unix:/tmp/mykitty

background_opacity 0.85
dynamic_background_opacity yes

include current_theme.conf
