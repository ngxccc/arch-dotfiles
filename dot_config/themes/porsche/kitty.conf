# vim:ft=kitty

## name:     Monochrome Porsche
## author:   Raizo (Lột xác từ Catppuccin)
## blurb:    Absolute OLED Black with Carmine Red Accents for the Elite!

# ==========================================
# 1. THE BASIC COLORS (Nền tảng)
# ==========================================
foreground              #F5F5F5
background              #000000
selection_foreground    #000000
selection_background    #F5F5F5

# ==========================================
# 2. CURSOR & URL (Điểm nhấn tương tác)
# ==========================================
cursor                  #D50000
cursor_text_color       #000000
url_color               #D50000

# ==========================================
# 3. SCROLLBAR & BORDERS (Khung gầm)
# ==========================================
scrollbar_handle_color  #333333
scrollbar_track_color   #0D0D0D
active_border_color     #D50000
inactive_border_color   #1A1A1A
bell_border_color       #D50000

# ==========================================
# 4. TAB BAR (Thanh điều hướng)
# ==========================================
active_tab_foreground   #000000
active_tab_background   #F5F5F5
inactive_tab_foreground #888888
inactive_tab_background #1A1A1A
tab_bar_background      #0D0D0D

# ==========================================
# 5. OS WINDOW TITLEBAR
# ==========================================
wayland_titlebar_color  system
macos_titlebar_color    system

# ==========================================
# 6. MARKS (Vùng đánh dấu)
# ==========================================
mark1_foreground        #000000
mark1_background        #D50000

# ==========================================
# 7. THE 16 ANSI COLORS (Bộ lọc Grayscale)
# ==========================================
# Black / Gray 
color0  #1A1A1A
color8  #333333

# Red (Porsche Accent - Báo lỗi / Lệnh sai)
color1  #D50000
color9  #FF3333

# Green (LỆNH GÕ ĐÚNG TRONG SHELL) 
color2  #E0E0E0
color10 #FFFFFF

# Yellow (Cảnh báo / Warning) -> Xám kim loại
color3  #AAAAAA
color11 #CCCCCC

# Blue (THƯ MỤC TRONG YAZI / LS)
color4  #F5F5F5
color12 #FFFFFF

# Magenta -> Đỏ bầm (Đồng bộ Porsche)
color5  #8A0000
color13 #B30000

# Cyan (Symlink / Metadata) -> Xám bạc
color6  #BBBBBB
color14 #DDDDDD

# White
color7  #F5F5F5
color15 #FFFFFF
