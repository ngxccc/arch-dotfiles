# ==============================================================================
# 🚀 MODERN TMUX CONFIGURATION
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. ERGONOMIC PREFIX CONFIGURATION
# ------------------------------------------------------------------------------
# Thay đổi phím Prefix từ Ctrl+b sang Ctrl+a (giống screen, đỡ mỏi tay)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ------------------------------------------------------------------------------
# 2. GENERAL OPTIONS
# ------------------------------------------------------------------------------
# Kích hoạt phím mở rộng (Extended keys) để nhận diện Shift+Enter, Ctrl+Enter...
set -s extended-keys on
# Bật chuột để cuộn, di chuyển pane, resize pane trực quan
set -g mouse on

# Giữ bôi đen (selection) và không tự động cuộn màn hình xuống cuối khi nhả chuột
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "wl-copy" \; send-keys -X clear-selection
unbind -T copy-mode MouseDragEnd1Pane
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "wl-copy" \; send-keys -X clear-selection

# Đánh số Window và Pane bắt đầu từ 1 (thay vì 0) để tương thích với dãy số bàn phím
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Tắt tự động đổi tên Window để giữ nguyên tên bạn đặt (code, docs, dev...)
set-option -g allow-rename off
set-window-option -g automatic-rename off

# Tăng kích thước bộ nhớ đệm lịch sử cuộn trang (scrollback history)
set -g history-limit 50000

# Giảm độ trễ khi nhấn ESC (giúp Neovim phản hồi phím nhanh hơn)
set -sg escape-time 10
# Tăng thời gian chờ phím lặp lại (repeat-time) lên 1000ms để dễ gõ phím lặp
set -g repeat-time 1000

# Tăng giới hạn độ dài hiển thị tên Session ở thanh trạng thái (mặc định chỉ 10 ký tự)
set -g status-left-length 50
set -g status-right-length 50

# ------------------------------------------------------------------------------
# 3. KEYBINDINGS (PHÍM TẮT TÙY BIẾN)
# ------------------------------------------------------------------------------
# Load lại file cấu hình nhanh bằng Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "🔄 Reloaded ~/.config/tmux/tmux.conf!"

# Chia Pane (Split) trực quan và tự động giữ nguyên thư mục hiện tại (CWD)
# Phím | chia dọc, phím - chia ngang
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Di chuyển vị trí của Window sang trái/phải bằng Prefix + < / > (Nhấn giữ/nhấn liên tiếp để dịch chuyển tiếp)
bind-key -r < swap-window -t -1
bind-key -r > swap-window -t +1

# Di chuyển giữa các Pane bằng phím Vim (Prefix + h/j/k/l) - Đã tắt để nhường cho vim-tmux-navigator
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# Thay đổi kích thước Pane (Resize) bằng phím in hoa Vim (Prefix + H/J/K/L)
# Sử dụng cờ -r để có thể bấm giữ/bấm liên tiếp nhiều lần sau khi nhấn Prefix 1 lần
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ------------------------------------------------------------------------------
# 4. PLUGINS CONFIGURATION (TPM)
# ------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Tự động lưu và khôi phục session khi bật/tắt máy (Session Persistence)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Cấu hình tự động khôi phục session gần nhất và tự động khởi chạy cùng hệ thống (Systemd)
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# 🚀 Theme Catppuccin đồng bộ giao diện tối màu với Neovim
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# Hiển thị tên Window (như code, docs, dev...) thay vì thư mục/tiến trình mặc định
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
# Khởi chạy TPM (Dòng này phải đặt ở cuối cùng của file)
run '~/.config/tmux/plugins/tpm/tpm'
