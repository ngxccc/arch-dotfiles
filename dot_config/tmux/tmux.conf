# ------------------------------------------------------------------------------
# 1. ERGONOMIC PREFIX CONFIGURATION
# ------------------------------------------------------------------------------
# Change the Prefix key from Ctrl+b to Ctrl+a (screen-style, more ergonomic)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ------------------------------------------------------------------------------
# 2. GENERAL OPTIONS
# ------------------------------------------------------------------------------
# Enable extended keys to recognize Shift+Enter, Ctrl+Enter, etc.
set -s extended-keys on
# Enable mouse support for scrolling, pane focus, and pane resizing
set -g mouse on

# Disable tmux clipboard integration using OSC 52 to prevent Kitty security prompts and garbage character issues
set -g set-clipboard off

# Copy selection and exit copy mode on mouse release
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
unbind -T copy-mode MouseDragEnd1Pane
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Start window and pane indices at 1 (instead of 0) to align with keyboard number row
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Disable automatic window renaming to preserve custom names (e.g., code, docs, dev)
set-option -g allow-rename off
set-window-option -g automatic-rename off

# Enable window title forwarding to host terminal
set -g set-titles on
set -g set-titles-string "#T"
set -ga update-environment 'KITTY_LISTEN_ON'
set -ga update-environment 'WAYLAND_DISPLAY'

# Increase scrollback buffer size
set -g history-limit 50000

# Reduce ESC key delay for faster Neovim key response
set -sg escape-time 10
# Increase repeat-time to 1000ms for comfortable repeated key presses
set -g repeat-time 1000

# Increase the maximum display length of the session name and status components
set -g status-left-length 50
set -g status-right-length 200

# ------------------------------------------------------------------------------
# 3. KEYBINDINGS
# ------------------------------------------------------------------------------
# Reload the configuration file with Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "🔄 Reloaded ~/.config/tmux/tmux.conf!"

# Split panes intuitively while preserving the current working directory (CWD)
# | for vertical split, - for horizontal split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Move window position left/right with Prefix + < / > (hold or press repeatedly to keep moving)
bind-key -r < swap-window -t -1
bind-key -r > swap-window -t +1

# Navigate between panes using Vim keys (Prefix + h/j/k/l) - Disabled in favor of vim-tmux-navigator
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# Resize panes using uppercase Vim keys (Prefix + H/J/K/L)
# The -r flag allows repeated presses after a single Prefix activation
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ------------------------------------------------------------------------------
# 4. PLUGINS CONFIGURATION (TPM)
# ------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Automatically save and restore sessions across reboots (Session Persistence)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatically restore the last session and launch tmux on system boot (Systemd)
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# 🚀 Catppuccin theme for a consistent dark UI matching Neovim
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# Use basic (square/flat) tabs for active and inactive windows
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# 🎨 Catppuccin Status Bar Customization (square block style to match Neovim)
set -g @catppuccin_status_left_separator  " █"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Customize directory and session text with a leading space for padding, keeping the full pane title / file path
set -g @catppuccin_directory_text " #{=80:pane_title}"
set -g @catppuccin_session_text " #S"
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}"
# Initialize TPM (this line must remain at the very end of the file)
run '~/.config/tmux/plugins/tpm/tpm'
