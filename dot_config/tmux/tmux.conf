# ==============================================================================
# 🚀 MODERN TMUX CONFIGURATION
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. ERGONOMIC PREFIX CONFIGURATION
# ------------------------------------------------------------------------------
# Thay đổi phím Prefix từ Ctrl+b sang Ctrl+a (giống screen, đỡ mỏi tay)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ------------------------------------------------------------------------------
# 2. GENERAL OPTIONS
# ------------------------------------------------------------------------------
# Bật chuột để cuộn, di chuyển pane, resize pane trực quan
set -g mouse on

# Đánh số Window và Pane bắt đầu từ 1 (thay vì 0) để tương thích với dãy số bàn phím
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Tăng kích thước bộ nhớ đệm lịch sử cuộn trang (scrollback history)
set -g history-limit 50000

# Giảm độ trễ khi nhấn ESC (giúp Neovim phản hồi phím nhanh hơn)
set -sg escape-time 10

# ------------------------------------------------------------------------------
# 3. KEYBINDINGS (PHÍM TẮT TÙY BIẾN)
# ------------------------------------------------------------------------------
# Load lại file cấu hình nhanh bằng Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "🔄 Reloaded ~/.config/tmux/tmux.conf!"

# Chia Pane (Split) trực quan và tự động giữ nguyên thư mục hiện tại (CWD)
# Phím | chia dọc, phím - chia ngang
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Di chuyển giữa các Pane bằng phím Vim (Prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ------------------------------------------------------------------------------
# 4. PLUGINS CONFIGURATION (TPM)
# ------------------------------------------------------------------------------
# Sử dụng Tmux Plugin Manager để tự động quản lý plugin
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Tự động lưu và khôi phục session khi bật/tắt máy (Session Persistence)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Cấu hình tự động khôi phục session gần nhất
set -g @continuum-restore 'on'

# Khởi chạy TPM (Dòng này phải đặt ở cuối cùng của file)
run '~/.config/tmux/plugins/tpm/tpm'
